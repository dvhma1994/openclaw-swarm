# Router Configuration
# Inspired by dario - Universal LLM Router

models:
  # Code generation
  coding:
    primary: "glm-5:cloud"
    fallback: "glm-5:cloud"
    timeout: 120

  # Reasoning tasks
  reasoning:
    primary: "glm-5:cloud"
    fallback: "glm-5:cloud"
    timeout: 180

  # Conversations
  chat:
    primary: "glm-5:cloud"
    fallback: "glm-5:cloud"
    timeout: 60

  # General purpose
  general:
    primary: "glm-5:cloud"
    fallback: "glm-5:cloud"
    timeout: 90

  # Arabic support
  arabic:
    primary: "glm-5:cloud"
    fallback: "glm-5:cloud"
    timeout: 90

routing:
  # Auto-detect task type from prompt
  auto_detect: true
  
  # Use fallback on failure
  fallback_enabled: true
  
  # Max retries
  max_retries: 3

ollama:
  base_url: "http://localhost:11434"
  timeout: 300